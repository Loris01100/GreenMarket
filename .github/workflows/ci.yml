name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: greenmarket
          POSTGRES_PASSWORD: greenmarket
          POSTGRES_DB: greenmarket_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore GreenMarket/GreenMarket.sln

      - name: Build
        run: dotnet build GreenMarket/GreenMarket.sln --no-restore --configuration Release

      - name: Run tests
        run: >-
          dotnet test GreenMarket/GreenMarket.sln
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
        env:
          ConnectionStrings__DefaultConnection: >-
            Host=localhost;Port=5432;Database=greenmarket_db;
            Username=greenmarket;Password=greenmarket

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage
